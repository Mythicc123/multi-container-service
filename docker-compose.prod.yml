services:
  api:
    image: ${DOCKER_IMAGE}
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/todos
      - PORT=3000
    restart: always
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
