name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - name: Import existing security group if it exists
        id: import_sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${PROJECT_NAME}-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null)
          if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
            echo "Found existing security group: $SG_ID"
            echo "importing=true" >> $GITHUB_OUTPUT
          else
            echo "importing=false" >> $GITHUB_OUTPUT
          fi
        env:
          PROJECT_NAME: multi-container-service

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Import existing security group into Terraform state
        if: steps.import_sg.outputs.importing == 'true'
        working-directory: terraform
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${PROJECT_NAME}-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)
          terraform import aws_security_group.app $SG_ID
        env:
          PROJECT_NAME: multi-container-service

      - name: Import existing EC2 instance if it exists
        id: import_ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-server" "Name=instance-state-name,Values=running,stopped,pending" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text 2>/dev/null)
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Found existing EC2 instance: $INSTANCE_ID"
            echo "importing=true" >> $GITHUB_OUTPUT
            echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          else
            echo "importing=false" >> $GITHUB_OUTPUT
          fi
        env:
          PROJECT_NAME: multi-container-service

      - name: Import existing EC2 instance into Terraform state
        if: steps.import_ec2.outputs.importing == 'true'
        working-directory: terraform
        run: terraform import aws_instance.app_server ${{ steps.import_ec2.outputs.instance_id }}

      - name: Import existing Elastic IP if it exists
        id: import_eip
        run: |
          EIP=$(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-eip" \
            --query 'Addresses[0].AllocationId' \
            --output text 2>/dev/null)
          if [ -n "$EIP" ] && [ "$EIP" != "None" ]; then
            echo "Found existing Elastic IP: $EIP"
            echo "importing=true" >> $GITHUB_OUTPUT
            echo "eip_allocation_id=$EIP" >> $GITHUB_OUTPUT
          else
            echo "importing=false" >> $GITHUB_OUTPUT
          fi
        env:
          PROJECT_NAME: multi-container-service

      - name: Import existing Elastic IP into Terraform state
        if: steps.import_eip.outputs.importing == 'true'
        working-directory: terraform
        run: terraform import aws_eip.app ${{ steps.import_eip.outputs.eip_allocation_id }}

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}
          TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
          TF_VAR_subnet_id: ${{ secrets.SUBNET_ID }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}
          TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
          TF_VAR_subnet_id: ${{ secrets.SUBNET_ID }}

      - name: Get EC2 IP
        id: ec2
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible ansible-core

      - name: Create SSH key file
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > /tmp/ec2_key
          chmod 600 /tmp/ec2_key
          # Quick connectivity test
          timeout 10 ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no -i /tmp/ec2_key ubuntu@${{ steps.ec2.outputs.ip }} echo "SSH OK" && echo "SSH connection successful"

      - name: Add EC2 host to inventory
        run: |
          cat > /tmp/ansible_inventory << EOF
          [servers]
          app-server ansible_host=${{ steps.ec2.outputs.ip }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/ec2_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [servers:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install community.docker

      - name: Run Ansible playbook
        run: |
          DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/multi-container-service" \
          DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
          DOCKER_PASSWORD="${{ secrets.DOCKER_PASSWORD }}" \
          ansible-playbook -i /tmp/ansible_inventory ansible/playbook.yml
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/multi-container-service
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify deployment
        run: |
          echo "Waiting for API to be ready..."
          sleep 15
          curl -f "http://${{ steps.ec2.outputs.ip }}/health" \
            && echo "" \
            && echo "Deployment successful!" \
            || echo "Health check failed — check logs on the server"
