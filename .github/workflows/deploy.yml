name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}

      - name: Get instance IP
        id: ec2
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Save SSH private key to file
        working-directory: terraform
        run: terraform output -raw ssh_private_key > /tmp/ec2_key && chmod 600 /tmp/ec2_key

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible ansible-core

      - name: Add EC2 host to inventory
        run: |
          cat > /tmp/ansible_inventory << EOF
          [servers]
          app-server ansible_host=${{ steps.ec2.outputs.ip }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/ec2_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [servers:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install community.docker

      - name: Run Ansible playbook
        run: |
          DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/multi-container-service" \
          DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
          DOCKER_PASSWORD="${{ secrets.DOCKER_PASSWORD }}" \
          ansible-playbook -i /tmp/ansible_inventory ansible/playbook.yml
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/multi-container-service
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify deployment
        run: |
          echo "Waiting for API to be ready..."
          sleep 15
          curl -f "http://${{ steps.ec2.outputs.ip }}/health" \
            && echo "" \
            && echo "Deployment successful!" \
            || echo "Health check failed — check logs on the server"
