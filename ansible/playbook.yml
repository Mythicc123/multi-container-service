---
- name: Provision and deploy multi-container app
  hosts: servers
  become: true
  vars:
    app_directory: /opt/multi-container-service
    docker_image: "{{ lookup('env', 'DOCKER_IMAGE') }}"

  tasks:
    - name: Wait for apt lock to be released (user_data may still be running)
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 60); do
            if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
               ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; then
              echo "Apt lock released after ${i} seconds"
              exit 0
            fi
            sleep 5
          done
          echo "Warning: apt lock still held after 5 minutes"
        executable: /bin/bash
      changed_when: false

    - name: Fix broken dpkg state from previous failed install
      ansible.builtin.shell:
        cmd: dpkg --configure -a
        executable: /bin/bash

    - name: Ensure Docker is started
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      ansible.builtin.shell:
        cmd: usermod -aG docker ubuntu
        executable: /bin/bash
      changed_when: false

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_directory }}"
        state: directory
        mode: '0755'
        owner: ubuntu
        group: docker

    - name: Create .env with Docker image reference
      ansible.builtin.copy:
        content: |
          DOCKER_IMAGE={{ docker_image }}
        dest: "{{ app_directory }}/.env"
        mode: '0644'
        owner: ubuntu
        group: docker

    - name: Copy docker-compose.prod.yml to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.prod.yml"
        dest: "{{ app_directory }}/docker-compose.yml"
        mode: '0644'
        owner: ubuntu
        group: docker

    - name: Copy nginx config to server (for Docker volume mount)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../nginx/nginx.conf"
        dest: "{{ app_directory }}/nginx.conf"
        mode: '0644'
        owner: ubuntu
        group: docker

    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ lookup('env', 'DOCKER_USERNAME') }}"
        password: "{{ lookup('env', 'DOCKER_PASSWORD') }}"

    - name: Stop existing containers (keep volumes)
      ansible.builtin.shell:
        cmd: docker compose -f docker-compose.yml down || true
        executable: bash
        chdir: "{{ app_directory }}"
      changed_when: false

    - name: Pull latest image and start containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_directory }}"
        files:
          - docker-compose.yml
        state: present
        pull: always

    - name: Wait for API to be healthy
      ansible.builtin.wait_for:
        url: "http://localhost/health"
        delay: 15
        timeout: 120
        state: started

  handlers:
    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Restart Nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
