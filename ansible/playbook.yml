---
- name: Provision and deploy multi-container app
  hosts: servers
  become: true
  vars:
    app_directory: /opt/multi-container-service
    docker_compose_version: "v2"

  tasks:
    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Start and enable Nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_directory }}"
        state: directory
        mode: '0755'
        owner: ubuntu
        group: docker

    - name: Copy docker-compose.prod.yml to server
      ansible.builtin.copy:
        src: ../docker-compose.prod.yml
        dest: "{{ app_directory }}/docker-compose.yml"
        mode: '0644'
        owner: ubuntu
        group: docker

    - name: Create .env file with Docker image
      ansible.builtin.copy:
        dest: "{{ app_directory }}/.env"
        content: |
          DOCKER_IMAGE={{ lookup('env', 'DOCKER_IMAGE') }}
        mode: '0644'
        owner: ubuntu
        group: docker

    - name: Copy Nginx config to server
      ansible.builtin.copy:
        src: ../nginx/nginx.conf
        dest: /etc/nginx/sites-available/default
        mode: '0644'
      notify: Reload Nginx

    - name: Enable Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
      notify: Reload Nginx

    - name: Test Nginx config
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Run docker compose up
      community.docker.docker_compose_v2:
        project_src: "{{ app_directory }}"
        files:
          - docker-compose.yml
        pull: always
        state: present
      environment:
        DOCKER_IMAGE: "{{ lookup('env', 'DOCKER_IMAGE') }}"

    - name: Wait for API to be healthy
      ansible.builtin.wait_for:
        host: "localhost"
        port: 80
        delay: 10
        timeout: 60
        state: started

  handlers:
    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
