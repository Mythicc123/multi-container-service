---
- name: Provision and deploy multi-container app
  hosts: servers
  become: true
  vars:
    app_directory: /opt/multi-container-service
    docker_image: "{{ lookup('env', 'DOCKER_IMAGE') | default('your-dockerhub-username/multi-container-service', true) }}"
    docker_compose_version: "latest"

  tasks:
    - name: Update apt cache (Ubuntu/Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install prerequisites (Debian)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (Debian)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository (Debian)
      ansible.builtin.apt_repository:
        repo: "deb https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker (Debian)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker (Amazon Linux / RHEL)
      ansible.builtin.yum:
        name:
          - docker
          - docker-compose
        state: present
      when: ansible_os_family == "RedHat" or ansible_distribution == "Amazon"

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      ansible.builtin.command: usermod -aG docker ec2-user
      when: ansible_user == "ec2-user"

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_directory }}"
        state: directory
        mode: '0755'

    - name: Copy docker-compose.prod.yml to server
      ansible.builtin.copy:
        src: ../docker-compose.prod.yml
        dest: "{{ app_directory }}/docker-compose.yml"
        mode: '0644'

    - name: Copy Nginx config to server
      ansible.builtin.copy:
        src: ../nginx/nginx.conf
        dest: /etc/nginx/conf.d/default.conf
        mode: '0644'
      notify: Reload Nginx

    - name: Start and enable Nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Pull Docker image
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull
        tag: latest
      register: image_pull

    - name: Pull latest docker-compose file
      ansible.builtin.copy:
        src: ../docker-compose.prod.yml
        dest: "{{ app_directory }}/docker-compose.yml"
        mode: '0644'

    - name: Run docker compose up
      community.docker.docker_compose_v2:
        project_src: "{{ app_directory }}"
        files:
          - docker-compose.yml
        state: present
      vars:
        DOCKER_IMAGE: "{{ docker_image }}"
      environment:
        DOCKER_IMAGE: "{{ docker_image }}"

    - name: Wait for API to be healthy
      ansible.builtin.wait_for:
        url: "http://localhost/health"
        delay: 10
        timeout: 60
        state: started

  handlers:
    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
