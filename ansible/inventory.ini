[servers]
# Replace HOST_IP with your EC2 public IP after running terraform apply
# For manual runs: terraform output -raw ssh_private_key > /tmp/ec2_key && chmod 600 /tmp/ec2_key
app-server ansible_host=HOST_IP ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/ec2_key

[servers:vars]
ansible_python_interpreter=/usr/bin/python3
